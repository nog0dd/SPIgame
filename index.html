<!DOCTYPE html>
<html>
<head>
    <title>🔍 Антикварная лавка</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5ebe0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .game-container {
            background: #e6d5b8;
            border-radius: 50px;
            padding: 30px;
            border: 6px solid #c4a27a;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            max-width: 1800px;
            width: 100%;
        }
        
        /* ТЕКСТОВОЕ ОКОШКО */
        .text-box {
            background: #f5e6d3;
            border-radius: 40px;
            padding: 25px 35px;
            margin-bottom: 30px;
            border: 4px solid #a6896b;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }
        
        .text-box p {
            font-size: 28px;
            color: #4a3729;
            line-height: 1.4;
            text-align: center;
            font-weight: 500;
        }
        
        /* ЭКРАН ВХОДА */
        .login-screen {
            background: #f5e6d3;
            border-radius: 40px;
            padding: 50px;
            border: 4px solid #a6896b;
            max-width: 700px;
            margin: 30px auto;
            text-align: center;
        }
        
        .login-screen h1 {
            font-size: 48px;
            color: #4a3729;
            margin-bottom: 20px;
        }
        
        .login-input {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            border-radius: 60px;
            border: 4px solid #8b6f50;
            background: white;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .login-btn {
            background: #5fa87f;
            color: white;
            border: none;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 70px;
            cursor: pointer;
            border: 4px solid #8fecb0;
            width: 100%;
            transition: 0.2s;
        }
        
        .login-btn:hover {
            transform: scale(1.02);
            background: #6fb98f;
        }
        
        .login-btn:disabled {
            background: #b5926a;
            border-color: #e9b87a;
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .game-screen {
            display: none;
        }
        
        .game-screen.active {
            display: block;
        }
        
        /* ГЛАВНАЯ КАРТИНКА */
        .image-zone {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: auto;
            aspect-ratio: 1400/900;
            margin: 0 auto 30px auto;
            border-radius: 0;
            overflow: hidden;
            border: 8px solid #b5926a;
            cursor: crosshair;
            background: #f5e6d3;
        }
        
        #gameImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: transparent;
        }
        
        /* КОНТЕЙНЕР ПРЕДМЕТОВ - 5 ШТУК ПО 250х250 */
        .items-container {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 25px;
            background: #d4b595;
            border-radius: 60px;
            border: 4px solid #a6896b;
            margin: 30px 0;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #b5926a #f5e6d3;
        }
        
        .items-container::-webkit-scrollbar {
            height: 12px;
        }
        
        .items-container::-webkit-scrollbar-track {
            background: #f5e6d3;
            border-radius: 10px;
        }
        
        .items-container::-webkit-scrollbar-thumb {
            background: #b5926a;
            border-radius: 10px;
        }
        
        .item-image {
            width: 250px;
            height: 250px;
            flex-shrink: 0;
            object-fit: cover;
            transition: 0.3s;
            filter: brightness(1);
            border-radius: 25px;
            border: 5px solid #e9d4b0;
            background: #f5e6d3;
            padding: 10px;
        }
        
        .item-image.found {
            filter: brightness(0.3) grayscale(1);
            opacity: 0.6;
            border-color: #a6896b;
        }
        
        #message {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #4a3729;
            margin: 20px 0;
            min-height: 60px;
        }
        
        .reset-btn {
            background: #b5926a;
            border: none;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            border: 4px solid #e9b87a;
            margin: 20px auto 0;
            display: block;
        }
        
        /* ТЕЛЕФОНЫ */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .game-container {
                padding: 15px;
                border-radius: 30px;
            }
            
            .text-box {
                padding: 15px 20px;
                margin-bottom: 20px;
            }
            
            .text-box p {
                font-size: 20px;
            }
            
            .login-screen {
                padding: 25px;
            }
            
            .login-screen h1 {
                font-size: 32px;
            }
            
            .login-input {
                padding: 15px;
                font-size: 18px;
            }
            
            .login-btn {
                font-size: 24px;
                padding: 15px 25px;
            }
            
            .image-zone {
                aspect-ratio: auto;
                height: 50vh;
                border-width: 4px;
                margin-bottom: 20px;
            }
            
            .item-image {
                width: 180px;
                height: 180px;
            }
            
            #message {
                font-size: 24px;
            }
            
            .reset-btn {
                font-size: 20px;
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- ЭКРАН ВХОДА -->
        <div id="loginScreen" class="login-screen">
            <h1>🏺 АНТИКВАРНАЯ ЛАВКА</h1>
            <div class="text-box">
                <p>Добро пожаловать в мою антикварную лавку! Представься, пожалуйста!</p>
            </div>
            <input type="text" id="loginName" class="login-input" placeholder="Имя Фамилия" oninput="checkLoginForm()">
            <input type="text" id="loginInstitute" class="login-input" placeholder="Институт" oninput="checkLoginForm()">
            <button id="loginBtn" class="login-btn" onclick="startGame()" disabled>🚪 ВОЙТИ</button>
        </div>
        
        <!-- ИГРОВОЙ ЭКРАН -->
        <div id="gameScreen" class="game-screen">
            <!-- ТЕКСТОВОЕ ОКНО (меняется динамически) -->
            <div class="text-box" id="storyText">
                <p>Слушай, у меня здесь затерялось парочку диковин, не поможешь найти?</p>
            </div>
            
            <!-- КАРТИНКА -->
            <div class="image-zone" id="imageZone">
                <img src="игра1/игра.jpg" id="gameImage" alt="Антикварная лавка">
            </div>
            
            <div id="message"></div>
            
            <!-- ПРЕДМЕТЫ (5 штук) -->
            <div class="items-container" id="itemsContainer"></div>
            
            <button class="reset-btn" onclick="resetGame()">🔄 НАЧАТЬ ЗАНОВО</button>
        </div>
    </div>

    <script>
        // ============================================
        // ДАННЫЕ ИГРОКА И ТЕКСТЫ
        // ============================================
        let currentPlayer = {
            name: '',
            institute: ''
        };
        
        let currentLevel = 1;
        
        const storyTexts = [
            "Слушай, у меня здесь затерялось парочку диковин, не поможешь найти?",
            "Ох! Спасибо! Выручил! Сможешь найти ещё несколько предметов?",
            "У тебя отлично получается! Как на счёт того, чтобы в последний раз выручить меня? Постарайся найти эти предметы",
            "Ну ты настоящий сыщик! Очень помог мне. В долгу не останусь!"
        ];
        
        // ============================================
        // УРОВНИ - ПО 5 СЛУЧАЙНЫХ ПРЕДМЕТОВ
        // ============================================
        
        // Уровень 1 (выбраны 5 случайных из 9)
        const level1Items = [
            { name: "СУНДУК", file: "игра1/сундук.png", x: 391, y: 736, radius: 60, found: false },
            { name: "ЗОНТ", file: "игра1/зонт.png", x: 382, y: 229, radius: 55, found: false },
            { name: "ЯЩИК", file: "игра1/ящик.png", x: 530, y: 549, radius: 60, found: false },
            { name: "ЗЕРКАЛО", file: "игра1/зеркало.png", x: 288, y: 396, radius: 55, found: false },
            { name: "РАМКА", file: "игра1/рамка.png", x: 442, y: 335, radius: 55, found: false }
        ];
        
        // Уровень 2 (выбраны 5 случайных из 9)
        const level2Items = [
            { name: "ЧАСИКИ", file: "игра2/часики.png", x: 336, y: 251, radius: 50, found: false },
            { name: "МАСКА", file: "игра2/маска.png", x: 264, y: 489, radius: 50, found: false },
            { name: "СКАЛКИ", file: "игра2/скалки.png", x: 439, y: 850, radius: 50, found: false },
            { name: "ЧУЧЕЛО2", file: "игра2/чучело2.png", x: 465, y: 508, radius: 50, found: false },
            { name: "ЗАМОК", file: "игра2/замок.png", x: 224, y: 650, radius: 50, found: false }
        ];
        
        // Уровень 3 (выбраны 5 случайных из 9)
        const level3Items = [
            { name: "РУСАЛКА", file: "игра3/русалка.png", x: 277, y: 118, radius: 50, found: false },
            { name: "ТАРЕЛКА", file: "игра3/тарелка.png", x: 464, y: 542, radius: 55, found: false },
            { name: "ЧАСЫ2", file: "игра3/часы2.png", x: 383, y: 753, radius: 50, found: false },
            { name: "ШКАТУЛКА", file: "игра3/шкатулка.png", x: 563, y: 750, radius: 50, found: false },
            { name: "УДОЧКА", file: "игра3/удочка.png", x: 421, y: 913, radius: 55, found: false }
        ];

        let items = level1Items;

        // ============================================
        // DOM ЭЛЕМЕНТЫ
        // ============================================
        const imageZone = document.getElementById('imageZone');
        const image = document.getElementById('gameImage');
        const itemsContainer = document.getElementById('itemsContainer');
        const messageDiv = document.getElementById('message');
        const storyDiv = document.getElementById('storyText').querySelector('p');
        
        // ============================================
        // ФУНКЦИИ
        // ============================================
        
        function checkLoginForm() {
            const name = document.getElementById('loginName').value.trim();
            const institute = document.getElementById('loginInstitute').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = !(name && institute);
        }
        
        function startGame() {
            currentPlayer.name = document.getElementById('loginName').value.trim();
            currentPlayer.institute = document.getElementById('loginInstitute').value.trim();
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('gameScreen').classList.add('active');
            
            console.log('✅ Новый игрок:', currentPlayer);
        }
        
        function updateItemsList() {
            let html = '';
            items.forEach(item => {
                const foundClass = item.found ? 'found' : '';
                html += `<img src="${item.file}" class="item-image ${foundClass}" alt="${item.name}">`;
            });
            itemsContainer.innerHTML = html;

            if (items.every(item => item.found)) {
                if (currentLevel === 1) {
                    messageDiv.innerHTML = '🎉 УРОВЕНЬ 1 ПРОЙДЕН! 🎉';
                    setTimeout(() => nextLevel(), 1500);
                } else if (currentLevel === 2) {
                    messageDiv.innerHTML = '🎉 УРОВЕНЬ 2 ПРОЙДЕН! 🎉';
                    setTimeout(() => nextLevel(), 1500);
                } else if (currentLevel === 3) {
                    messageDiv.innerHTML = '🎉 ИГРА ПРОЙДЕНА! СПАСИБО! 🎉';
                    storyDiv.textContent = storyTexts[3];
                }
            } else {
                messageDiv.innerHTML = '';
            }
        }
        
        function nextLevel() {
            if (currentLevel === 1) {
                currentLevel = 2;
                image.src = 'игра2/игра2.jpg';
                items = level2Items;
                storyDiv.textContent = storyTexts[1];
            } else if (currentLevel === 2) {
                currentLevel = 3;
                image.src = 'игра3/игра3.jpg';
                items = level3Items;
                storyDiv.textContent = storyTexts[2];
            }
            
            items.forEach(item => item.found = false);
            updateItemsList();
            messageDiv.innerHTML = '';
        }

        imageZone.addEventListener('click', (e) => {
            const rect = imageZone.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            const scaleX = image.naturalWidth / rect.width;
            const scaleY = image.naturalHeight / rect.height;
            const imgX = Math.round(clickX * scaleX);
            const imgY = Math.round(clickY * scaleY);

            items.forEach(item => {
                if (!item.found) {
                    const dx = imgX - item.x;
                    const dy = imgY - item.y;
                    if (Math.sqrt(dx*dx + dy*dy) < item.radius) {
                        item.found = true;
                    }
                }
            });

            updateItemsList();
        });

        function resetGame() {
            currentLevel = 1;
            image.src = 'игра1/игра.jpg';
            items = level1Items;
            items.forEach(item => item.found = false);
            storyDiv.textContent = storyTexts[0];
            updateItemsList();
            messageDiv.innerHTML = '';
            
            // Возврат на экран входа
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('loginName').value = '';
            document.getElementById('loginInstitute').value = '';
            document.getElementById('loginBtn').disabled = true;
        }

        image.onload = updateItemsList;
        if (image.complete) updateItemsList();
        updateItemsList();
    </script>
</body>
</html>
