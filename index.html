<!DOCTYPE html>
<html>
<head>
    <title>🔍 Найди предметы - 3 уровня</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5ebe0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .game-container {
            background: #e6d5b8;
            border-radius: 50px;
            padding: 30px;
            border: 6px solid #c4a27a;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            max-width: 1800px;
            width: 100%;
        }
        
        .player-form {
            background: #d4b595;
            border-radius: 60px;
            padding: 20px 30px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            border: 3px solid #a6896b;
        }
        
        .player-form input {
            padding: 15px 25px;
            font-size: 20px;
            border-radius: 50px;
            border: 3px solid #8b6f50;
            background: #f5e6d3;
            width: 280px;
            max-width: 100%;
        }
        
        .player-form button {
            background: #8b6f50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: 3px solid #e9b87a;
        }
        
        .image-zone {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: auto;
            aspect-ratio: 1100/800;
            margin: 0 auto 25px auto;
            border-radius: 40px;
            overflow: hidden;
            border: 8px solid #b5926a;
            cursor: crosshair;
            /* НОВЫЙ ФОН - такой же как у предметов */
            background: #f5e6d3;
        }
        
        #gameImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            /* Убираем фон у картинки */
            background: transparent;
        }
        
        .items-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
            padding: 20px;
            background: #d4b595;
            border-radius: 50px;
            border: 4px solid #a6896b;
        }
        
        .item-image {
            width: 250px;
            height: 250px;
            max-width: calc(25% - 10px);
            min-width: 120px;
            object-fit: cover;
            transition: 0.3s;
            filter: brightness(1);
            border-radius: 20px;
            margin: 0;
            border: 5px solid #e9d4b0;
            background: #f5e6d3;
            padding: 8px;
        }
        
        .item-image.found {
            filter: brightness(0.3) grayscale(1);
            opacity: 0.6;
            border-color: #a6896b;
        }
        
        #message {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            color: #4a3729;
            margin: 20px 0;
            min-height: 70px;
        }
        
        .level-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .level-btn {
            background: #b5926a;
            border: none;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            border: 4px solid #e9b87a;
            transition: 0.2s;
        }
        
        .level-btn:hover {
            transform: scale(1.05);
            background: #c4a27a;
        }
        
        .level-btn.active {
            background: #5fa87f;
            border-color: #8fecb0;
        }
        
        .reset-btn {
            background: #b5926a;
            border: none;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            border: 4px solid #e9b87a;
            margin: 10px auto 0;
            display: block;
        }
        
        .instruction {
            color: #4a3729;
            font-size: 26px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .level-indicator {
            text-align: center;
            font-size: 24px;
            color: #4a3729;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .coords-hint {
            text-align: center;
            color: #8b6f50;
            font-size: 18px;
            margin-top: 10px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
            }
            
            .instruction {
                font-size: 20px;
            }
            
            .item-image {
                width: 150px;
                height: 150px;
            }
            
            #message {
                font-size: 30px;
            }
            
            .level-btn, .reset-btn {
                font-size: 18px;
                padding: 12px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="instruction">🔍 НАЙДИ ВСЕ ПРЕДМЕТЫ НА КАРТИНКЕ</div>
        
        <div class="level-indicator" id="levelIndicator">УРОВЕНЬ 1</div>
        
        <div class="player-form">
            <input type="text" placeholder="Имя Фамилия" id="firstName">
            <input type="text" placeholder="Институт" id="institute">
            <button onclick="savePlayerInfo()">💾 СОХРАНИТЬ</button>
        </div>
        
        <div class="level-buttons">
            <button class="level-btn active" onclick="switchToLevel(1)">🎮 УРОВЕНЬ 1</button>
            <button class="level-btn" onclick="switchToLevel(2)">🎮 УРОВЕНЬ 2</button>
            <button class="level-btn" onclick="switchToLevel(3)">🎮 УРОВЕНЬ 3</button>
        </div>
        
        <!-- КАРТИНКА ТЕПЕРЬ НА СВЕТЛОМ ФОНЕ -->
        <div class="image-zone" id="imageZone">
            <img src="игра1/игра.jpg" id="gameImage" alt="Найди предметы">
        </div>
        
        <div id="message"></div>
        
        <div class="items-container" id="itemsContainer"></div>
        
        <button class="reset-btn" onclick="resetGame()">🔄 СБРОСИТЬ ВСЁ</button>
        
        <div class="coords-hint" id="coordsHint">
            👆 Кликай по предметам - координаты появятся в консоли (F12)
        </div>
    </div>

    <script>
        let currentLevel = 1;
        
        // УРОВЕНЬ 1
        const level1Items = [
            { name: "СУНДУК", file: "игра1/сундук.png", x: 391, y: 736, radius: 60, found: false },
            { name: "ЗАЯЦ", file: "игра1/заяц.png", x: 183, y: 344, radius: 55, found: false },
            { name: "ЗОНТ", file: "игра1/зонт.png", x: 382, y: 229, radius: 55, found: false },
            { name: "ЗЕРКАЛО2", file: "игра1/зеркало2.png", x: 228, y: 565, radius: 60, found: false },
            { name: "ЯЩИК", file: "игра1/ящик.png", x: 530, y: 549, radius: 60, found: false },
            { name: "КОРЗИНА", file: "игра1/корзина.png", x: 398, y: 451, radius: 55, found: false },
            { name: "ЗЕРКАЛО", file: "игра1/зеркало.png", x: 288, y: 396, radius: 55, found: false },
            { name: "ВАЗА", file: "игра1/ваза.png", x: 321, y: 416, radius: 55, found: false },
            { name: "РАМКА", file: "игра1/рамка.png", x: 442, y: 335, radius: 55, found: false }
        ];
        
        // УРОВЕНЬ 2
        const level2Items = [
            { name: "КАРТИНА", file: "игра2/картина.png", x: 231, y: 268, radius: 50, found: false },
            { name: "ЧАСИКИ", file: "игра2/часики.png", x: 336, y: 251, radius: 50, found: false },
            { name: "СЕРДЕЧКО", file: "игра2/сердечко.png", x: 393, y: 453, radius: 50, found: false },
            { name: "МАСКА", file: "игра2/маска.png", x: 264, y: 489, radius: 50, found: false },
            { name: "САМОВАР", file: "игра2/самовар.png", x: 327, y: 699, radius: 55, found: false },
            { name: "СКАЛКИ", file: "игра2/скалки.png", x: 439, y: 850, radius: 50, found: false },
            { name: "ЧУЧЕЛО", file: "игра2/чучело.png", x: 237, y: 858, radius: 55, found: false },
            { name: "ЧУЧЕЛО2", file: "игра2/чучело2.png", x: 465, y: 508, radius: 50, found: false },
            { name: "ЗАМОК", file: "игра2/замок.png", x: 224, y: 650, radius: 50, found: false }
        ];
        
        // УРОВЕНЬ 3
        const level3Items = [
            { name: "РУСАЛКА", file: "игра3/русалка.png", x: 277, y: 118, radius: 50, found: false },
            { name: "ЗЕЛЕНЫЙГРАФИН", file: "игра3/зеленыйграфин.png", x: 494, y: 137, radius: 50, found: false },
            { name: "ТАРЕЛКА", file: "игра3/тарелка.png", x: 464, y: 542, radius: 55, found: false },
            { name: "ЧАСЫ2", file: "игра3/часы2.png", x: 383, y: 753, radius: 50, found: false },
            { name: "ЛАМПА", file: "игра3/лампа.png", x: 373, y: 321, radius: 50, found: false },
            { name: "ШКАТУЛКА", file: "игра3/шкатулка.png", x: 563, y: 750, radius: 50, found: false },
            { name: "УДОЧКА", file: "игра3/удочка.png", x: 421, y: 913, radius: 55, found: false },
            { name: "УРНА", file: "игра3/урна.png", x: 423, y: 674, radius: 50, found: false },
            { name: "ВАЗА", file: "игра3/ваза.png", x: 250, y: 324, radius: 50, found: false }
        ];

        let items = level1Items;

        const imageZone = document.getElementById('imageZone');
        const image = document.getElementById('gameImage');
        const itemsContainer = document.getElementById('itemsContainer');
        const messageDiv = document.getElementById('message');
        const levelIndicator = document.getElementById('levelIndicator');
        const coordsHint = document.getElementById('coordsHint');
        const levelBtns = document.querySelectorAll('.level-btn');

        function updateItemsList() {
            let html = '';
            items.forEach(item => {
                const foundClass = item.found ? 'found' : '';
                html += `<img src="${item.file}" class="item-image ${foundClass}" alt="${item.name}">`;
            });
            itemsContainer.innerHTML = html;

            if (items.every(item => item.found)) {
                messageDiv.innerHTML = '🎉 ТЫ НАШЁЛ ВСЕ ПРЕДМЕТЫ! ПОЗДРАВЛЯЕМ! 🎉';
            } else {
                messageDiv.innerHTML = '';
            }
        }

        function switchToLevel(level) {
            currentLevel = level;
            levelIndicator.textContent = `УРОВЕНЬ ${level}`;
            
            levelBtns.forEach((btn, index) => {
                if (index + 1 === level) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            if (level === 1) {
                image.src = 'игра1/игра.jpg';
                items = level1Items;
                coordsHint.innerHTML = '👆 Уровень 1: Найди все предметы';
            } else if (level === 2) {
                image.src = 'игра2/игра2.jpg';
                items = level2Items;
                coordsHint.innerHTML = '👆 Уровень 2: Найди все предметы';
            } else if (level === 3) {
                image.src = 'игра3/игра3.jpg';
                items = level3Items;
                coordsHint.innerHTML = '👆 Уровень 3: Найди все предметы';
            }
            
            items.forEach(item => item.found = false);
            updateItemsList();
            messageDiv.innerHTML = '';
        }

        function savePlayerInfo() {
            const name = document.getElementById('firstName').value.trim();
            const institute = document.getElementById('institute').value.trim();
            
            if (name && institute) {
                alert(`✅ Спасибо, ${name} из ${institute}!`);
            } else {
                alert('❌ Введите имя и институт!');
            }
        }

        imageZone.addEventListener('click', (e) => {
            const rect = imageZone.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            const scaleX = image.naturalWidth / rect.width;
            const scaleY = image.naturalHeight / rect.height;
            const imgX = Math.round(clickX * scaleX);
            const imgY = Math.round(clickY * scaleY);

            console.log(`%c🔴 УРОВЕНЬ ${currentLevel}: X=${imgX}, Y=${imgY}`, 'background: #8b6f50; color: white; padding: 2px 5px; border-radius: 5px;');

            items.forEach(item => {
                if (!item.found) {
                    const dx = imgX - item.x;
                    const dy = imgY - item.y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance < item.radius) {
                        item.found = true;
                        console.log(`✅ Найден: ${item.name}`);
                    }
                }
            });

            updateItemsList();
        });

        function resetGame() {
            level1Items.forEach(item => item.found = false);
            level2Items.forEach(item => item.found = false);
            level3Items.forEach(item => item.found = false);
            
            switchToLevel(1);
            
            document.getElementById('firstName').value = '';
            document.getElementById('institute').value = '';
        }

        image.onload = () => {
            console.log('Картинка загружена');
            updateItemsList();
        };

        if (image.complete) {
            updateItemsList();
        }

        updateItemsList();
    </script>
</body>
</html>
