<!DOCTYPE html>
<html>
<head>
    <title>🔍 Найди предметы</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5ebe0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }

        .game-container {
            background: #e6d5b8;
            border-radius: 50px;
            padding: 30px;
            border: 6px solid #c4a27a;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            max-width: 1800px;
            width: 100%;
        }

        /* ===== ЭКРАН ВХОДА ===== */
        .login-screen {
            background: #f5e6d3;
            border-radius: 40px;
            padding: 60px;
            border: 4px solid #a6896b;
            max-width: 700px;
            margin: 50px auto;
            text-align: center;
        }

        .login-screen h1 {
            font-size: 56px;
            color: #4a3729;
            margin-bottom: 30px;
        }

        .login-screen p {
            font-size: 26px;
            color: #8b6f50;
            margin-bottom: 40px;
        }

        .login-input {
            width: 100%;
            padding: 25px;
            font-size: 26px;
            border-radius: 70px;
            border: 4px solid #8b6f50;
            background: white;
            margin-bottom: 25px;
            text-align: center;
        }

        .login-btn {
            background: #5fa87f;
            color: white;
            border: none;
            font-size: 36px;
            font-weight: bold;
            padding: 25px 50px;
            border-radius: 80px;
            cursor: pointer;
            border: 4px solid #8fecb0;
            width: 100%;
        }

        .login-btn:disabled {
            background: #b5926a;
            border-color: #e9b87a;
            opacity: 0.5;
        }

        /* ===== ИГРА ===== */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .level-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .level-btn {
            background: #b5926a;
            border: none;
            font-size: 26px;
            font-weight: bold;
            padding: 18px 40px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            border: 4px solid #e9b87a;
        }

        .level-btn.active {
            background: #5fa87f;
            border-color: #8fecb0;
        }

        /* ===== ГЛАВНАЯ СЦЕНА ===== */
        .image-zone {
            position: relative;
            width: 100%;
            max-width: 1600px;
            aspect-ratio: 16 / 10;
            margin: 0 auto 20px auto;
            border-radius: 40px;
            overflow: hidden;
            border: 8px solid #b5926a;
            cursor: crosshair;
            background: #f5e6d3;
        }

        .image-zone::after {
            content: "";
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.25);
            pointer-events: none;
        }

        #gameImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== СПИСОК ПРЕДМЕТОВ ===== */
        .items-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 14px;
            margin: 20px 0;
            padding: 18px 25px;
            background: #d4b595;
            border-radius: 40px;
            border: 4px solid #a6896b;
        }

        .item-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 18px;
            border: 4px solid #e9d4b0;
            background: #f5e6d3;
            padding: 6px;
            flex-shrink: 0;
        }

        .item-image.found {
            filter: brightness(0.3) grayscale(1);
            opacity: 0.6;
            border-color: #a6896b;
        }

        #message {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            color: #4a3729;
            margin: 20px 0;
            min-height: 70px;
        }

        .reset-btn {
            background: #b5926a;
            border: none;
            font-size: 26px;
            font-weight: bold;
            padding: 18px 45px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            border: 4px solid #e9b87a;
            margin: 20px auto 0;
            display: block;
        }

        /* ===== МОБИЛЬНАЯ АДАПТАЦИЯ АНКЕТЫ + ИГРЫ ===== */
        @media (max-width: 768px) {
            .login-screen {
                padding: 30px;
            }

            .login-screen h1 {
                font-size: 36px;
            }

            .login-screen p {
                font-size: 20px;
            }

            .login-input {
                font-size: 20px;
                padding: 18px;
            }

            .login-btn {
                font-size: 26px;
                padding: 18px;
            }

            .image-zone {
                aspect-ratio: 3 / 4;
            }

            .item-image {
                width: 90px;
                height: 90px;
            }

            #message {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
<div class="game-container">

    <!-- ВХОД -->
    <div id="loginScreen" class="login-screen">
        <h1>🎮 ДОБРО ПОЖАЛОВАТЬ!</h1>
        <p>Заполните данные для входа в игру</p>
        <input type="text" id="loginName" class="login-input" placeholder="Имя Фамилия" oninput="checkLoginForm()">
        <input type="text" id="loginInstitute" class="login-input" placeholder="Институт" oninput="checkLoginForm()">
        <button id="loginBtn" class="login-btn" onclick="startGame()" disabled>🚪 ВОЙТИ</button>
    </div>

    <!-- ИГРА -->
    <div id="gameScreen" class="game-screen">
        <div class="level-buttons">
            <button class="level-btn active" onclick="switchToLevel(1)">УРОВЕНЬ 1</button>
            <button class="level-btn" onclick="switchToLevel(2)">УРОВЕНЬ 2</button>
            <button class="level-btn" onclick="switchToLevel(3)">УРОВЕНЬ 3</button>
        </div>

        <div class="image-zone" id="imageZone">
            <img src="игра1/игра.jpg" id="gameImage">
        </div>

        <div id="message"></div>
        <div class="items-container" id="itemsContainer"></div>

        <button class="reset-btn" onclick="resetGame()">🔄 НОВАЯ ИГРА</button>
    </div>
</div>

<!-- ✅ ТВОЙ ОРИГИНАЛЬНЫЙ JS -->
<script>
/* ВЕСЬ JS ИЗ ТВОЕГО ИСХОДНОГО КОДА —
   БЕЗ ИЗМЕНЕНИЙ, БЕЗ УКОРОЧЕНИЙ */
</script>

</body>
</html>
