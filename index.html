<!DOCTYPE html>
<html>
<head>
    <title>Антикварная лавка</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5ebe0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .game-container {
            background: #e6d5b8;
            border-radius: 50px;
            padding: 30px;
            border: 6px solid #c4a27a;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            max-width: 1800px;
            width: 100%;
            position: relative;
        }
        
        /* ЗАСТАВКИ УРОВНЕЙ */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(230, 213, 184, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            padding: 20px;
        }
        
        .splash-content {
            text-align: center;
            max-width: 800px;
            padding: 50px;
            background: #f5e6d3;
            border-radius: 60px;
            border: 4px solid #a6896b;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        
        .splash-content p {
            font-size: 32px;
            color: #4a3729;
            margin-bottom: 40px;
            line-height: 1.4;
        }
        
        .splash-hint {
            font-size: 24px;
            color: #b5926a;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* КНОПКА К НАЧАЛУ */
        .restart-btn {
            background: #b5926a;
            color: white;
            border: none;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 50px;
            border-radius: 80px;
            cursor: pointer;
            border: 4px solid #e9b87a;
            margin: 30px auto 0;
            display: inline-block;
            transition: 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            background: #c4a27a;
        }
        
        /* АНКЕТА */
        .login-screen {
            background: #f5e6d3;
            border-radius: 40px;
            padding: 60px;
            border: 4px solid #a6896b;
            max-width: 700px;
            margin: 50px auto;
            text-align: center;
        }
        
        /* НАЧАЛЬНЫЙ ТЕКСТ - ИСПРАВЛЕННЫЙ */
        .login-screen p {
            font-size: 36px;
            font-weight: 900;
            color: #4a3729;
            margin-bottom: 50px;
            line-height: 1.4;
            text-shadow: 2px 2px 0 #e9d4b0;
            letter-spacing: 1px;
        }
        
        .login-input {
            width: 100%;
            padding: 25px;
            font-size: 26px;
            border-radius: 70px;
            border: 4px solid #8b6f50;
            background: white;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .login-btn {
            background: #5fa87f;
            color: white;
            border: none;
            font-size: 36px;
            font-weight: bold;
            padding: 25px 50px;
            border-radius: 80px;
            cursor: pointer;
            border: 4px solid #8fecb0;
            width: 100%;
            transition: 0.2s;
        }
        
        .login-btn:hover {
            transform: scale(1.02);
            background: #6fb98f;
        }
        
        .login-btn:disabled {
            background: #b5926a;
            border-color: #e9b87a;
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* ИГРОВОЙ ЭКРАН */
        .game-screen {
            display: none;
        }
        
        .game-screen.active {
            display: block;
        }
        
        .image-zone {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: auto;
            aspect-ratio: 1400/900;
            margin: 0 auto 30px auto;
            border-radius: 0;
            overflow: hidden;
            border: 8px solid #b5926a;
            cursor: none;
            background: #f5e6d3;
        }
        
        #gameImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: transparent;
            pointer-events: none;
        }
        
        /* ЛУПА */
        .magnifier {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid gold;
            box-shadow: 0 0 20px gold, inset 0 0 10px white;
            pointer-events: none;
            z-index: 100;
            display: none;
            transform: translate(-50%, -50%);
            overflow: hidden;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(2px);
        }
        
        /* ПРЕДМЕТЫ */
        .items-container {
            display: flex;
            overflow-x: auto;
            gap: 30px;
            padding: 30px;
            background: #d4b595;
            border-radius: 60px;
            border: 4px solid #a6896b;
            margin: 30px 0;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        
        .item-image {
            width: 350px;
            height: 350px;
            flex-shrink: 0;
            object-fit: cover;
            transition: 0.3s;
            filter: brightness(1);
            border-radius: 40px;
            border: 8px solid #e9d4b0;
            background: #f5e6d3;
            padding: 15px;
        }
        
        .item-image.found {
            filter: brightness(0.3) grayscale(1);
            opacity: 0.6;
            border-color: #a6896b;
        }
        
        #message {
            text-align: center;
            font-size: 44px;
            font-weight: bold;
            color: #4a3729;
            margin: 25px 0;
            min-height: 80px;
        }
        
        /* ТЕЛЕФОНЫ */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .game-container {
                padding: 10px;
                border-radius: 30px;
            }
            
            .splash-content {
                padding: 30px;
            }
            
            .splash-content p {
                font-size: 24px;
            }
            
            .login-screen {
                padding: 20px;
            }
            
            .login-screen p {
                font-size: 28px;
                margin-bottom: 30px;
            }
            
            .login-input {
                padding: 15px;
                font-size: 18px;
            }
            
            .login-btn {
                font-size: 24px;
                padding: 15px 30px;
            }
            
            .image-zone {
                aspect-ratio: auto;
                height: 70vh;
                max-height: 600px;
                border-width: 4px;
                margin-bottom: 15px;
            }
            
            #gameImage {
                object-fit: cover;
            }
            
            .magnifier {
                width: 150px;
                height: 150px;
                border-width: 3px;
            }
            
            /* ПРЕДМЕТЫ ЕЩЁ БОЛЬШЕ НА ТЕЛЕФОНЕ */
            .items-container {
                gap: 20px;
                padding: 15px;
            }
            
            .item-image {
                width: 300px;
                height: 300px;
                border-width: 5px;
                padding: 8px;
            }
            
            #message {
                font-size: 28px;
            }
            
            .restart-btn {
                font-size: 22px;
                padding: 15px 30px;
            }
        }
        
        @media (max-width: 480px) {
            .image-zone {
                height: 60vh;
            }
            
            .magnifier {
                width: 130px;
                height: 130px;
            }
            
            .item-image {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- АНКЕТА (С ИСПРАВЛЕННЫМ ТЕКСТОМ) -->
        <div id="loginScreen" class="login-screen">
            <p>Добро пожаловать в нашу антикварную лавку! Представься, пожалуйста!</p>
            <input type="text" id="loginName" class="login-input" placeholder="Имя Фамилия" oninput="checkLoginForm()">
            <input type="text" id="loginInstitute" class="login-input" placeholder="Институт" oninput="checkLoginForm()">
            <button id="loginBtn" class="login-btn" onclick="startGame()" disabled>ВОЙТИ</button>
        </div>
        
        <!-- ИГРОВОЙ ЭКРАН -->
        <div id="gameScreen" class="game-screen">
            <div class="image-zone" id="imageZone">
                <img src="игра1/игра.jpg" id="gameImage" alt="Антикварная лавка">
                <div class="magnifier" id="magnifier"></div>
            </div>
            
            <div id="message"></div>
            
            <div class="items-container" id="itemsContainer"></div>
        </div>
    </div>

    <script>
        // ============================================
        // ЛУПА
        // ============================================
        const imageZone = document.getElementById('imageZone');
        const magnifier = document.getElementById('magnifier');
        const gameImage = document.getElementById('gameImage');
        
        imageZone.addEventListener('mousemove', (e) => {
            const rect = imageZone.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            magnifier.style.display = 'block';
            magnifier.style.left = x + 'px';
            magnifier.style.top = y + 'px';
            
            // Увеличиваем фрагмент картинки (опционально)
            const bgX = (x / rect.width) * 100;
            const bgY = (y / rect.height) * 100;
            magnifier.style.backgroundImage = `url('${gameImage.src}')`;
            magnifier.style.backgroundSize = `${rect.width * 2}px ${rect.height * 2}px`;
            magnifier.style.backgroundPosition = `${bgX * 2 - 50}% ${bgY * 2 - 50}%`;
        });
        
        imageZone.addEventListener('mouseleave', () => {
            magnifier.style.display = 'none';
        });
        
        // Для телефонов (touch-события)
        imageZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = imageZone.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            if (x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
                magnifier.style.display = 'block';
                magnifier.style.left = x + 'px';
                magnifier.style.top = y + 'px';
                
                const bgX = (x / rect.width) * 100;
                const bgY = (y / rect.height) * 100;
                magnifier.style.backgroundImage = `url('${gameImage.src}')`;
                magnifier.style.backgroundSize = `${rect.width * 2}px ${rect.height * 2}px`;
                magnifier.style.backgroundPosition = `${bgX * 2 - 50}% ${bgY * 2 - 50}%`;
            }
        });
        
        imageZone.addEventListener('touchend', () => {
            magnifier.style.display = 'none';
        });
        
        // ============================================
        // АНКЕТА
        // ============================================
        let currentPlayer = {
            name: '',
            institute: ''
        };
        
        function checkLoginForm() {
            const name = document.getElementById('loginName').value.trim();
            const institute = document.getElementById('loginInstitute').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = !(name && institute);
        }
        
        function startGame() {
            currentPlayer.name = document.getElementById('loginName').value.trim();
            currentPlayer.institute = document.getElementById('loginInstitute').value.trim();
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('gameScreen').classList.add('active');
            
            // Показываем заставку перед 1 уровнем
            showLevelSplash('Слушай, у меня здесь затерялось парочку диковин, не поможешь найти?');
        }
        
        // ============================================
        // ЗАСТАВКИ УРОВНЕЙ
        // ============================================
        function showLevelSplash(text) {
            const splash = document.createElement('div');
            splash.className = 'splash-screen';
            splash.innerHTML = `
                <div class="splash-content">
                    <p>${text}</p>
                    <div class="splash-hint">👇 Нажми в любое место 👇</div>
                </div>
            `;
            
            document.body.appendChild(splash);
            
            splash.addEventListener('click', function() {
                this.remove();
            });
        }
        
        // Финальный экран
        function showFinalSplash() {
            const splash = document.createElement('div');
            splash.className = 'splash-screen';
            splash.innerHTML = `
                <div class="splash-content">
                    <p>Ну ты настоящий сыщик! Очень помог мне. В долгу не останусь!</p>
                    <button class="restart-btn" onclick="restartToLogin()">К НАЧАЛУ</button>
                </div>
            `;
            
            document.body.appendChild(splash);
        }
        
        // Возврат к анкете
        function restartToLogin() {
            document.querySelectorAll('.splash-screen').forEach(el => el.remove());
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('loginName').value = '';
            document.getElementById('loginInstitute').value = '';
            document.getElementById('loginBtn').disabled = true;
        }
        
        // ============================================
        // ПРЕДМЕТЫ (ПО 5 НА УРОВЕНЬ)
        // ============================================
        let currentLevel = 1;
        
        const level1Items = [
            { name: "СУНДУК", file: "игра1/сундук.png", x: 391, y: 736, radius: 60, found: false },
            { name: "ЗАЯЦ", file: "игра1/заяц.png", x: 183, y: 344, radius: 55, found: false },
            { name: "ЗОНТ", file: "игра1/зонт.png", x: 382, y: 229, radius: 55, found: false },
            { name: "ЗЕРКАЛО", file: "игра1/зеркало.png", x: 288, y: 396, radius: 55, found: false },
            { name: "ВАЗА", file: "игра1/ваза.png", x: 321, y: 416, radius: 55, found: false }
        ];
        
        const level2Items = [
            { name: "КАРТИНА", file: "игра2/картина.png", x: 231, y: 268, radius: 50, found: false },
            { name: "ЧАСИКИ", file: "игра2/часики.png", x: 336, y: 251, radius: 50, found: false },
            { name: "САМОВАР", file: "игра2/самовар.png", x: 327, y: 699, radius: 55, found: false },
            { name: "ЧУЧЕЛО", file: "игра2/чучело.png", x: 237, y: 858, radius: 55, found: false },
            { name: "ЗАМОК", file: "игра2/замок.png", x: 224, y: 650, radius: 50, found: false }
        ];
        
        const level3Items = [
            { name: "РУСАЛКА", file: "игра3/русалка.png", x: 277, y: 118, radius: 50, found: false },
            { name: "ТАРЕЛКА", file: "игра3/тарелка.png", x: 464, y: 542, radius: 55, found: false },
            { name: "ЛАМПА", file: "игра3/лампа.png", x: 373, y: 321, radius: 50, found: false },
            { name: "ШКАТУЛКА", file: "игра3/шкатулка.png", x: 563, y: 750, radius: 50, found: false },
            { name: "УРНА", file: "игра3/урна.png", x: 423, y: 674, radius: 50, found: false }
        ];

        let items = level1Items;

        const imageZoneGame = document.getElementById('imageZone');
        const image = document.getElementById('gameImage');
        const itemsContainer = document.getElementById('itemsContainer');
        const messageDiv = document.getElementById('message');

        function updateItemsList() {
            let html = '';
            items.forEach(item => {
                const foundClass = item.found ? 'found' : '';
                html += `<img src="${item.file}" class="item-image ${foundClass}" alt="${item.name}">`;
            });
            itemsContainer.innerHTML = html;

            if (items.every(item => item.found)) {
                if (currentLevel === 1) {
                    messageDiv.innerHTML = '';
                    showLevelSplash('Ох! Спасибо! Выручил! Сможешь найти ещё несколько предметов?');
                    switchToLevel(2);
                } else if (currentLevel === 2) {
                    messageDiv.innerHTML = '';
                    showLevelSplash('У тебя отлично получается! Как на счёт того, чтобы в последний раз выручить меня? Постарайся найти эти предметы');
                    switchToLevel(3);
                } else if (currentLevel === 3) {
                    messageDiv.innerHTML = '';
                    showFinalSplash();
                }
            } else {
                messageDiv.innerHTML = '';
            }
        }

        function switchToLevel(level) {
            currentLevel = level;
            
            const levelMap = {
                1: { src: 'игра1/игра.jpg', items: level1Items },
                2: { src: 'игра2/игра2.jpg', items: level2Items },
                3: { src: 'игра3/игра3.jpg', items: level3Items }
            };
            
            image.src = levelMap[level].src;
            items = levelMap[level].items;
            
            items.forEach(item => item.found = false);
            updateItemsList();
            messageDiv.innerHTML = '';
        }

        imageZoneGame.addEventListener('click', (e) => {
            const rect = imageZoneGame.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            const scaleX = image.naturalWidth / rect.width;
            const scaleY = image.naturalHeight / rect.height;
            const imgX = Math.round(clickX * scaleX);
            const imgY = Math.round(clickY * scaleY);

            items.forEach(item => {
                if (!item.found) {
                    const dx = imgX - item.x;
                    const dy = imgY - item.y;
                    if (Math.sqrt(dx*dx + dy*dy) < item.radius) {
                        item.found = true;
                    }
                }
            });

            updateItemsList();
        });

        image.onload = updateItemsList;
        if (image.complete) updateItemsList();
        updateItemsList();
    </script>
</body>
</html>
