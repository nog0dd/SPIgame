<!DOCTYPE html>
<html>
<head>
    <title>🔍 Найди предметы - 3 уровня</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5ebe0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .game-container {
            background: #e6d5b8;
            border-radius: 50px;
            padding: 30px;
            border: 6px solid #c4a27a;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            max-width: 1800px;
            width: 100%;
        }
        
        .player-form {
            background: #d4b595;
            border-radius: 60px;
            padding: 20px 30px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            border: 3px solid #a6896b;
        }
        
        .player-form input {
            padding: 15px 25px;
            font-size: 20px;
            border-radius: 50px;
            border: 3px solid #8b6f50;
            background: #f5e6d3;
            width: 280px;
            max-width: 100%;
        }
        
        .player-form button {
            background: #8b6f50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: 3px solid #e9b87a;
        }
        
        .image-zone {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: auto;
            aspect-ratio: 1100/800;
            margin: 0 auto 25px auto;
            border-radius: 40px;
            overflow: hidden;
            border: 8px solid #b5926a;
            cursor: crosshair;
            background: #3a4a5a;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        
        #gameImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #2a3a4a;
        }
        
        .items-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
            padding: 20px;
            background: #d4b595;
            border-radius: 50px;
            border: 4px solid #a6896b;
        }
        
        .item-image {
            width: 250px;
            height: 250px;
            max-width: calc(25% - 10px);
            min-width: 120px;
            object-fit: cover;
            transition: 0.3s;
            filter: brightness(1);
            border-radius: 20px;
            margin: 0;
            border: 5px solid #e9d4b0;
            background: #f5e6d3;
            padding: 8px;
        }
        
        .item-image.found {
            filter: brightness(0.3) grayscale(1);
            opacity: 0.6;
            border-color: #a6896b;
        }
        
        #message {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            color: #4a3729;
            margin: 20px 0;
            min-height: 70px;
        }
        
        .next-level-btn {
            background: #5fa87f;
            border: none;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 60px;
            border-radius: 70px;
            cursor: pointer;
            color: white;
            border: 4px solid #8fecb0;
            margin: 20px auto;
            display: none;
        }
        
        .reset-btn {
            background: #b5926a;
            border: none;
            font-size: 28px;
            font-weight: bold;
            padding: 18px 60px;
            border-radius: 70px;
            cursor: pointer;
            color: white;
            border: 4px solid #e9b87a;
            margin: 10px auto 0;
            display: block;
        }
        
        .instruction {
            color: #4a3729;
            font-size: 26px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .level-indicator {
            text-align: center;
            font-size: 24px;
            color: #4a3729;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .coords-hint {
            text-align: center;
            color: #8b6f50;
            font-size: 18px;
            margin-top: 10px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
            }
            
            .instruction {
                font-size: 20px;
            }
            
            .item-image {
                width: 150px;
                height: 150px;
            }
            
            #message {
                font-size: 30px;
            }
            
            .reset-btn, .next-level-btn {
                font-size: 22px;
                padding: 15px 40px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="instruction">🔍 НАЙДИ ВСЕ ПРЕДМЕТЫ НА КАРТИНКЕ</div>
        
        <div class="level-indicator" id="levelIndicator">УРОВЕНЬ 1</div>
        
        <div class="player-form">
            <input type="text" placeholder="Имя Фамилия" id="firstName">
            <input type="text" placeholder="Институт" id="institute">
            <button onclick="savePlayerInfo()">💾 СОХРАНИТЬ</button>
        </div>
        
        <div class="image-zone" id="imageZone">
            <img src="игра1/игра.jpg" id="gameImage" alt="Найди предметы">
        </div>
        
        <div id="message"></div>
        
        <button class="next-level-btn" id="nextLevelBtn" onclick="nextLevel()">➡️ СЛЕДУЮЩИЙ УРОВЕНЬ</button>
        
        <div class="items-container" id="itemsContainer"></div>
        
        <button class="reset-btn" onclick="resetGame()">🔄 НОВАЯ ИГРА</button>
        
        <!-- Подсказка для сбора координат -->
        <div class="coords-hint" id="coordsHint">
            👆 Кликай по предметам - координаты появятся в консоли (F12)
        </div>
    </div>

    <script>
        let currentLevel = 1;
        
        // УРОВЕНЬ 1 - с путями к папке игра1
        const level1Items = [
            { name: "СУНДУК", file: "игра1/сундук.png", x: 391, y: 736, radius: 60, found: false },
            { name: "ЗАЯЦ", file: "игра1/заяц.png", x: 183, y: 344, radius: 55, found: false },
            { name: "ЗОНТ", file: "игра1/зонт.png", x: 382, y: 229, radius: 55, found: false },
            { name: "ЗЕРКАЛО2", file: "игра1/зеркало2.png", x: 228, y: 565, radius: 60, found: false },
            { name: "ЯЩИК", file: "игра1/ящик.png", x: 530, y: 549, radius: 60, found: false },
            { name: "КОРЗИНА", file: "игра1/корзина.png", x: 398, y: 451, radius: 55, found: false },
            { name: "ЗЕРКАЛО", file: "игра1/зеркало.png", x: 288, y: 396, radius: 55, found: false },
            { name: "ВАЗА", file: "игра1/ваза.png", x: 321, y: 416, radius: 55, found: false },
            { name: "РАМКА", file: "игра1/рамка.png", x: 442, y: 335, radius: 55, found: false }
        ];
        
        // УРОВЕНЬ 2 - пока без координат (ты их соберешь)
        const level2Items = [
            { name: "ПРЕДМЕТ1", file: "игра2/предмет1.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ2", file: "игра2/предмет2.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ3", file: "игра2/предмет3.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ4", file: "игра2/предмет4.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ5", file: "игра2/предмет5.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ6", file: "игра2/предмет6.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ7", file: "игра2/предмет7.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ8", file: "игра2/предмет8.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ9", file: "игра2/предмет9.png", x: 0, y: 0, radius: 50, found: false }
        ];
        
        // УРОВЕНЬ 3 - пока пустой
        const level3Items = [
            { name: "ПРЕДМЕТ1", file: "игра3/предмет1.png", x: 0, y: 0, radius: 50, found: false },
            { name: "ПРЕДМЕТ2", file: "игра3/предмет2.png", x: 0, y: 0, radius: 50, found: false }
        ];

        let items = level1Items;

        const imageZone = document.getElementById('imageZone');
        const image = document.getElementById('gameImage');
        const itemsContainer = document.getElementById('itemsContainer');
        const messageDiv = document.getElementById('message');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const levelIndicator = document.getElementById('levelIndicator');
        const coordsHint = document.getElementById('coordsHint');

        function updateItemsList() {
            let html = '';
            items.forEach(item => {
                const foundClass = item.found ? 'found' : '';
                html += `<img src="${item.file}" class="item-image ${foundClass}" alt="${item.name}">`;
            });
            itemsContainer.innerHTML = html;

            if (items.every(item => item.found)) {
                messageDiv.innerHTML = '🎉 ТЫ НАШЁЛ ВСЕ ПРЕДМЕТЫ! ПОЗДРАВЛЯЕМ! 🎉';
                
                if (currentLevel === 1) {
                    nextLevelBtn.style.display = 'block';
                    nextLevelBtn.textContent = '➡️ УРОВЕНЬ 2';
                } else if (currentLevel === 2) {
                    nextLevelBtn.style.display = 'block';
                    nextLevelBtn.textContent = '➡️ УРОВЕНЬ 3';
                } else {
                    nextLevelBtn.style.display = 'none';
                }
            } else {
                messageDiv.innerHTML = '';
                nextLevelBtn.style.display = 'none';
            }
        }

        function nextLevel() {
            if (currentLevel === 1) {
                currentLevel = 2;
                levelIndicator.textContent = 'УРОВЕНЬ 2';
                image.src = 'игра2/игра2.jpg';  // ИСПРАВЛЕНО: игра2.jpg
                items = level2Items;
                coordsHint.innerHTML = '📢 РЕЖИМ СБОРА КООРДИНАТ: Кликай по предметам и записывай значения из консоли (F12)';
            } else if (currentLevel === 2) {
                currentLevel = 3;
                levelIndicator.textContent = 'УРОВЕНЬ 3';
                image.src = 'игра3/игра3.jpg';
                items = level3Items;
            }
            
            updateItemsList();
            nextLevelBtn.style.display = 'none';
            messageDiv.innerHTML = '';
        }

        function savePlayerInfo() {
            const name = document.getElementById('firstName').value.trim();
            const institute = document.getElementById('institute').value.trim();
            
            if (name && institute) {
                alert(`✅ Спасибо, ${name} из ${institute}!`);
            } else {
                alert('❌ Введите имя и институт!');
            }
        }

        imageZone.addEventListener('click', (e) => {
            const rect = imageZone.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            const scaleX = image.naturalWidth / rect.width;
            const scaleY = image.naturalHeight / rect.height;
            const imgX = Math.round(clickX * scaleX);
            const imgY = Math.round(clickY * scaleY);

            // ВЫВОД В КОНСОЛЬ - то что тебе нужно скопировать
            console.log(`%c🔴 УРОВЕНЬ ${currentLevel}: X=${imgX}, Y=${imgY}`, 'background: #8b6f50; color: white; padding: 2px 5px; border-radius: 5px;');

            items.forEach(item => {
                if (!item.found) {
                    const dx = imgX - item.x;
                    const dy = imgY - item.y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance < item.radius) {
                        item.found = true;
                        console.log(`✅ Найден: ${item.name}`);
                    }
                }
            });

            updateItemsList();
        });

        function resetGame() {
            currentLevel = 1;
            levelIndicator.textContent = 'УРОВЕНЬ 1';
            image.src = 'игра1/игра.jpg';
            items = level1Items;
            items.forEach(item => item.found = false);
            updateItemsList();
            document.getElementById('firstName').value = '';
            document.getElementById('institute').value = '';
            nextLevelBtn.style.display = 'none';
            coordsHint.innerHTML = '👆 Кликай по предметам - координаты появятся в консоли (F12)';
        }

        image.onload = () => {
            console.log('Картинка загружена');
            updateItemsList();
        };

        if (image.complete) {
            updateItemsList();
        }

        updateItemsList();
    </script>
</body>
</html>
