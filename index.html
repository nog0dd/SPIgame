<!DOCTYPE html>
<html>
<head>
    <title>Антикварная лавка</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5ebe0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .game-container {
            background: #e6d5b8;
            border-radius: 50px;
            padding: 30px;
            border: 6px solid #c4a27a;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            max-width: 1800px;
            width: 100%;
        }
        
        /* ЗАСТАВКИ УРОВНЕЙ */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(230, 213, 184, 0.95);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            padding: 20px;
        }
        
        .splash-content {
            text-align: center;
            max-width: 800px;
            padding: 50px;
            background: #f5e6d3;
            border-radius: 60px;
            border: 4px solid #a6896b;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        
        .splash-content p {
            font-size: 32px;
            color: #4a3729;
            margin-bottom: 40px;
            line-height: 1.4;
        }
        
        .splash-hint {
            font-size: 24px;
            color: #b5926a;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* КНОПКА К НАЧАЛУ */
        .restart-btn {
            background: #b5926a;
            color: white;
            border: none;
            font-size: 32px;
            font-weight: bold;
            padding: 20px 50px;
            border-radius: 80px;
            cursor: pointer;
            border: 4px solid #e9b87a;
            margin: 30px auto 0;
            display: inline-block;
            transition: 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            background: #c4a27a;
        }
        
        /* АНКЕТА */
        .login-screen {
            background: #f5e6d3;
            border-radius: 40px;
            padding: 60px;
            border: 4px solid #a6896b;
            max-width: 700px;
            margin: 50px auto;
            text-align: center;
        }
        
        .login-screen p {
            font-size: 36px;
            font-weight: 900;
            color: #4a3729;
            margin-bottom: 50px;
            line-height: 1.4;
            text-shadow: 2px 2px 0 #e9d4b0;
            letter-spacing: 1px;
        }
        
        .login-input {
            width: 100%;
            padding: 25px;
            font-size: 26px;
            border-radius: 70px;
            border: 4px solid #8b6f50;
            background: white;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .login-btn {
            background: #5fa87f;
            color: white;
            border: none;
            font-size: 36px;
            font-weight: bold;
            padding: 25px 50px;
            border-radius: 80px;
            cursor: pointer;
            border: 4px solid #8fecb0;
            width: 100%;
            transition: 0.2s;
        }
        
        .login-btn:hover {
            transform: scale(1.02);
            background: #6fb98f;
        }
        
        .login-btn:disabled {
            background: #b5926a;
            border-color: #e9b87a;
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* ПОДСКАЗКА НАД КАРТИНКОЙ */
        .hint-container {
            text-align: center;
            margin-bottom: 10px;
            padding: 10px;
            background: #d4b595;
            border-radius: 60px;
            border: 3px solid #a6896b;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
        
        .hint-text {
            font-size: 20px;
            color: #4a3729;
            padding: 0 20px;
        }
        
        /* ИГРОВОЙ ЭКРАН */
        .game-screen {
            display: none;
        }
        
        .game-screen.active {
            display: block;
        }
        
        /* КАРТИНКА - МАКСИМАЛЬНО БЛИЗКО К ПРЕДМЕТАМ */
        .image-zone {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: auto;
            aspect-ratio: 1400/900;
            margin: 0 auto 0 auto; /* Убрал отступ снизу полностью */
            border-radius: 0;
            overflow: hidden;
            border: 8px solid #b5926a;
            cursor: crosshair;
            background: #f5e6d3;
        }
        
        #gameImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: transparent;
            pointer-events: auto;
        }
        
        /* ЛУПА - не мешает кликам */
        .magnifier-container {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            display: none;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
        }
        
        .magnifier-glass {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 6px solid gold;
            box-shadow: 0 0 30px gold, inset 0 0 20px rgba(255,255,255,0.8);
            overflow: hidden;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(1px);
            transform: translate(-120%, -120%);
        }
        
        .magnifier-handle {
            position: absolute;
            width: 180px;
            height: 30px;
            background: linear-gradient(145deg, #b5926a, #6b4f3a);
            border-radius: 30px;
            border: 4px solid #e9b87a;
            transform-origin: 0 0;
            transform: rotate(45deg);
            top: 100px;
            left: 100px;
            box-shadow: 0 8px 12px rgba(0,0,0,0.3);
        }
        
        .magnifier-handle::after {
            content: '';
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: linear-gradient(145deg, #d4b595, #b5926a);
            border-radius: 50%;
            border: 3px solid #e9b87a;
        }
        
        /* ПРЕДМЕТЫ - ВПЛОТНУЮ К КАРТИНКЕ */
        .items-container {
            display: flex;
            overflow-x: auto;
            gap: 30px;
            padding: 20px;
            background: #d4b595;
            border-radius: 60px;
            border: 4px solid #a6896b;
            margin: 0 0 20px 0; /* Убрал отступ сверху */
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        
        .item-image {
            width: 350px;
            height: 350px;
            flex-shrink: 0;
            object-fit: cover;
            transition: 0.3s;
            filter: brightness(1);
            border-radius: 40px;
            border: 8px solid #e9d4b0;
            background: #f5e6d3;
            padding: 15px;
        }
        
        .item-image.found {
            filter: brightness(0.3) grayscale(1);
            opacity: 0.6;
            border-color: #a6896b;
        }
        
        #message {
            text-align: center;
            font-size: 44px;
            font-weight: bold;
            color: #4a3729;
            margin: 15px 0;
            min-height: 80px;
        }
        
        /* ТЕЛЕФОНЫ */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .game-container {
                padding: 10px;
                border-radius: 30px;
            }
            
            .splash-content {
                padding: 30px;
            }
            
            .splash-content p {
                font-size: 24px;
            }
            
            .login-screen {
                padding: 20px;
            }
            
            .login-screen p {
                font-size: 28px;
                margin-bottom: 30px;
            }
            
            .login-input {
                padding: 15px;
                font-size: 18px;
            }
            
            .login-btn {
                font-size: 24px;
                padding: 15px 30px;
            }
            
            .hint-text {
                font-size: 16px;
            }
            
            .image-zone {
                aspect-ratio: auto;
                height: 70vh;
                max-height: 600px;
                border-width: 4px;
            }
            
            #gameImage {
                object-fit: cover;
            }
            
            .magnifier-glass {
                width: 160px;
                height: 160px;
            }
            
            .magnifier-handle {
                width: 140px;
                height: 25px;
                top: 80px;
                left: 80px;
            }
            
            .items-container {
                gap: 20px;
                padding: 15px;
                margin-top: 0;
            }
            
            .item-image {
                width: 300px;
                height: 300px;
            }
            
            #message {
                font-size: 28px;
            }
            
            .restart-btn {
                font-size: 22px;
                padding: 15px 30px;
            }
        }
        
        @media (max-width: 480px) {
            .image-zone {
                height: 60vh;
            }
            
            .magnifier-glass {
                width: 140px;
                height: 140px;
            }
            
            .magnifier-handle {
                width: 120px;
                height: 22px;
                top: 70px;
                left: 70px;
            }
            
            .item-image {
                width: 280px;
                height: 280px;
            }
            
            .hint-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- АНКЕТА -->
        <div id="loginScreen" class="login-screen">
            <p>Добро пожаловать в нашу антикварную лавку! Представься, пожалуйста!</p>
            <input type="text" id="loginName" class="login-input" placeholder="Имя Фамилия" oninput="checkLoginForm()">
            <input type="text" id="loginInstitute" class="login-input" placeholder="Институт" oninput="checkLoginForm()">
            <button id="loginBtn" class="login-btn" onclick="startGame()" disabled>ВОЙТИ</button>
        </div>
        
        <!-- ИГРОВОЙ ЭКРАН -->
        <div id="gameScreen" class="game-screen">
            <!-- ПОДСКАЗКА НАД КАРТИНКОЙ -->
            <div class="hint-container" id="hintContainer">
                <span class="hint-text" id="hintText">зажми экран на картинке, чтобы разглядеть получше 🔍</span>
            </div>
            
            <div class="image-zone" id="imageZone">
                <img src="игра1/игра.jpg" id="gameImage" alt="Антикварная лавка">
                <!-- ЛУПА -->
                <div class="magnifier-container" id="magnifierContainer">
                    <div class="magnifier-glass" id="magnifierGlass"></div>
                    <div class="magnifier-handle"></div>
                </div>
            </div>
            
            <div id="message"></div>
            
            <!-- ПРЕДМЕТЫ ВПЛОТНУЮ К КАРТИНКЕ -->
            <div class="items-container" id="itemsContainer"></div>
        </div>
    </div>

    <script>
        // ============================================
        // ЛУПА (СУПЕРТОЧНАЯ)
        // ============================================
        const imageZone = document.getElementById('imageZone');
        const magnifierContainer = document.getElementById('magnifierContainer');
        const magnifierGlass = document.getElementById('magnifierGlass');
        const gameImage = document.getElementById('gameImage');
        const hintContainer = document.getElementById('hintContainer');
        
        let currentLevel = 1;
        let isMagnifierActive = false;
        
        function updateHintVisibility() {
            hintContainer.style.display = currentLevel === 1 ? 'block' : 'none';
        }
        
        function updateMagnifier(clientX, clientY) {
            const rect = imageZone.getBoundingClientRect();
            
            // Координаты относительно контейнера
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            // Проверяем, что курсор внутри картинки
            if (x < 0 || x > rect.width || y < 0 || y > rect.height) {
                magnifierContainer.style.display = 'none';
                return;
            }
            
            magnifierContainer.style.display = 'block';
            isMagnifierActive = true;
            
            // Кончик ручки в точке касания
            magnifierContainer.style.left = x + 'px';
            magnifierContainer.style.top = y + 'px';
            
            // ТОЧНОЕ позиционирование увеличения
            const zoomLevel = 1.2;
            
            // Вычисляем смещение фона
            const bgX = (x / rect.width) * gameImage.naturalWidth * zoomLevel - 100;
            const bgY = (y / rect.height) * gameImage.naturalHeight * zoomLevel - 100;
            
            magnifierGlass.style.backgroundImage = `url('${gameImage.src}')`;
            magnifierGlass.style.backgroundSize = `${gameImage.naturalWidth * zoomLevel}px ${gameImage.naturalHeight * zoomLevel}px`;
            magnifierGlass.style.backgroundPosition = `-${bgX}px -${bgY}px`;
        }
        
        // Мышь (ПК)
        imageZone.addEventListener('mousemove', (e) => {
            updateMagnifier(e.clientX, e.clientY);
        });
        
        imageZone.addEventListener('mouseleave', () => {
            magnifierContainer.style.display = 'none';
            isMagnifierActive = false;
        });
        
        // Touch (телефоны)
        imageZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            updateMagnifier(touch.clientX, touch.clientY);
        });
        
        imageZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            updateMagnifier(touch.clientX, touch.clientY);
        });
        
        imageZone.addEventListener('touchend', () => {
            magnifierContainer.style.display = 'none';
            isMagnifierActive = false;
        });
        
        // Клик работает всегда (лупа временно скрывается)
        imageZone.addEventListener('click', (e) => {
            // Временно скрываем лупу для клика
            magnifierContainer.style.display = 'none';
            
            const rect = imageZone.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            const scaleX = gameImage.naturalWidth / rect.width;
            const scaleY = gameImage.naturalHeight / rect.height;
            const imgX = Math.round(clickX * scaleX);
            const imgY = Math.round(clickY * scaleY);

            items.forEach(item => {
                if (!item.found) {
                    const dx = imgX - item.x;
                    const dy = imgY - item.y;
                    if (Math.sqrt(dx*dx + dy*dy) < item.radius) {
                        item.found = true;
                    }
                }
            });

            updateItemsList();
            
            // Возвращаем лупу если нужно
            if (isMagnifierActive) {
                setTimeout(() => {
                    magnifierContainer.style.display = 'block';
                }, 10);
            }
        });
        
        // ============================================
        // АНКЕТА
        // ============================================
        let currentPlayer = {
            name: '',
            institute: ''
        };
        
        function checkLoginForm() {
            const name = document.getElementById('loginName').value.trim();
            const institute = document.getElementById('loginInstitute').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = !(name && institute);
        }
        
        function startGame() {
            currentPlayer.name = document.getElementById('loginName').value.trim();
            currentPlayer.institute = document.getElementById('loginInstitute').value.trim();
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('gameScreen').classList.add('active');
            
            showLevelSplash('Слушай, у меня здесь затерялось парочку диковин, не поможешь найти?');
        }
        
        // ============================================
        // ЗАСТАВКИ
        // ============================================
        function showLevelSplash(text) {
            const splash = document.createElement('div');
            splash.className = 'splash-screen';
            splash.innerHTML = `
                <div class="splash-content">
                    <p>${text}</p>
                    <div class="splash-hint">👇 Нажми в любое место 👇</div>
                </div>
            `;
            
            document.body.appendChild(splash);
            
            splash.addEventListener('click', function() {
                this.remove();
            });
        }
        
        function showFinalSplash() {
            const splash = document.createElement('div');
            splash.className = 'splash-screen';
            splash.innerHTML = `
                <div class="splash-content">
                    <p>Ну ты настоящий сыщик! Очень помог мне. В долгу не останусь!</p>
                    <button class="restart-btn" onclick="restartToLogin()">К НАЧАЛУ</button>
                </div>
            `;
            
            document.body.appendChild(splash);
        }
        
        function restartToLogin() {
            document.querySelectorAll('.splash-screen').forEach(el => el.remove());
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('loginName').value = '';
            document.getElementById('loginInstitute').value = '';
            document.getElementById('loginBtn').disabled = true;
        }
        
        // ============================================
        // ПРЕДМЕТЫ
        // ============================================
        const level1Items = [
            { name: "СУНДУК", file: "игра1/сундук.png", x: 391, y: 736, radius: 60, found: false },
            { name: "ЗАЯЦ", file: "игра1/заяц.png", x: 183, y: 344, radius: 55, found: false },
            { name: "ЗОНТ", file: "игра1/зонт.png", x: 382, y: 229, radius: 55, found: false },
            { name: "ЗЕРКАЛО", file: "игра1/зеркало.png", x: 288, y: 396, radius: 55, found: false },
            { name: "ВАЗА", file: "игра1/ваза.png", x: 321, y: 416, radius: 55, found: false }
        ];
        
        const level2Items = [
            { name: "КАРТИНА", file: "игра2/картина.png", x: 231, y: 268, radius: 50, found: false },
            { name: "ЧАСИКИ", file: "игра2/часики.png", x: 336, y: 251, radius: 50, found: false },
            { name: "САМОВАР", file: "игра2/самовар.png", x: 327, y: 699, radius: 55, found: false },
            { name: "ЧУЧЕЛО", file: "игра2/чучело.png", x: 237, y: 858, radius: 55, found: false },
            { name: "ЗАМОК", file: "игра2/замок.png", x: 224, y: 650, radius: 50, found: false }
        ];
        
        const level3Items = [
            { name: "РУСАЛКА", file: "игра3/русалка.png", x: 277, y: 118, radius: 50, found: false },
            { name: "ТАРЕЛКА", file: "игра3/тарелка.png", x: 464, y: 542, radius: 55, found: false },
            { name: "ЛАМПА", file: "игра3/лампа.png", x: 373, y: 321, radius: 50, found: false },
            { name: "ШКАТУЛКА", file: "игра3/шкатулка.png", x: 563, y: 750, radius: 50, found: false },
            { name: "УРНА", file: "игра3/урна.png", x: 423, y: 674, radius: 50, found: false }
        ];

        let items = level1Items;

        const itemsContainer = document.getElementById('itemsContainer');
        const messageDiv = document.getElementById('message');

        function updateItemsList() {
            let html = '';
            items.forEach(item => {
                const foundClass = item.found ? 'found' : '';
                html += `<img src="${item.file}" class="item-image ${foundClass}" alt="${item.name}">`;
            });
            itemsContainer.innerHTML = html;

            if (items.every(item => item.found)) {
                if (currentLevel === 1) {
                    messageDiv.innerHTML = '';
                    showLevelSplash('Ох! Спасибо! Выручил! Сможешь найти ещё несколько предметов?');
                    switchToLevel(2);
                } else if (currentLevel === 2) {
                    messageDiv.innerHTML = '';
                    showLevelSplash('У тебя отлично получается! Как на счёт того, чтобы в последний раз выручить меня? Постарайся найти эти предметы');
                    switchToLevel(3);
                } else if (currentLevel === 3) {
                    messageDiv.innerHTML = '';
                    showFinalSplash();
                }
            } else {
                messageDiv.innerHTML = '';
            }
            
            updateHintVisibility();
        }

        function switchToLevel(level) {
            currentLevel = level;
            
            const levelMap = {
                1: { src: 'игра1/игра.jpg', items: level1Items },
                2: { src: 'игра2/игра2.jpg', items: level2Items },
                3: { src: 'игра3/игра3.jpg', items: level3Items }
            };
            
            document.getElementById('gameImage').src = levelMap[level].src;
            items = levelMap[level].items;
            
            items.forEach(item => item.found = false);
            updateItemsList();
            messageDiv.innerHTML = '';
        }

        document.getElementById('gameImage').onload = updateItemsList;
        if (document.getElementById('gameImage').complete) updateItemsList();
        updateItemsList();
        updateHintVisibility();
    </script>
</body>
</html>
