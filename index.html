<!DOCTYPE html>
<html>
<head>
    <title>🔍 Найди предметы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5ebe0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 30px;
        }
        .game-container {
            background: #e6d5b8;
            border-radius: 50px;
            padding: 35px;
            border: 6px solid #c4a27a;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
            max-width: 1400px;
            width: 100%;
        }
        
        .player-form {
            background: #d4b595;
            border-radius: 60px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            border: 3px solid #a6896b;
        }
        
        .player-form input {
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 50px;
            border: 3px solid #8b6f50;
            background: #f5e6d3;
            width: 250px;
        }
        
        .player-form button {
            background: #8b6f50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            border: 3px solid #e9b87a;
        }
        
        .image-zone {
            position: relative;
            width: 900px;
            height: 650px;
            margin: 0 auto;
            border-radius: 40px;
            overflow: hidden;
            border: 8px solid #b5926a;
            cursor: crosshair;
            background: #3a4a5a;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        
        #gameImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #2a3a4a;
        }
        
        /* КОНТЕЙНЕР ДЛЯ МАЛЕНЬКИХ КАРТИНОК */
        .items-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            padding: 20px;
            background: #d4b595;
            border-radius: 60px;
            border: 4px solid #a6896b;
        }
        
        .item-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90px;
        }
        
        .item-image {
            width: 70px;
            height: 70px;
            object-fit: contain;
            transition: 0.3s;
            filter: brightness(1);
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            padding: 5px;
            border: 2px solid #8b6f50;
        }
        
        .item-image.found {
            filter: brightness(0.4) grayscale(1);
            opacity: 0.5;
            transform: scale(0.9);
            border-color: #5f9ea0;
        }
        
        .item-label {
            color: #4a3729;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        #message {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #4a3729;
            margin: 20px 0;
            min-height: 50px;
        }
        
        .reset-btn {
            background: #b5926a;
            border: none;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            border: 3px solid #e9b87a;
            margin: 0 auto;
            display: block;
        }
        
        .instruction {
            color: #4a3729;
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="instruction">🔍 НАЙДИ ВСЕ ПРЕДМЕТЫ НА КАРТИНКЕ</div>
        
        <div class="player-form">
            <input type="text" placeholder="Имя Фамилия" id="firstName">
            <input type="text" placeholder="Институт" id="institute">
            <button onclick="savePlayerInfo()">💾 СОХРАНИТЬ</button>
        </div>
        
        <div class="image-zone" id="imageZone">
            <img src="игра.jpg" id="gameImage" alt="Найди предметы">
        </div>
        
        <div id="message"></div>
        
        <!-- КОНТЕЙНЕР С ПРЕДМЕТАМИ (9 штук) -->
        <div class="items-container" id="itemsContainer"></div>
        
        <button class="reset-btn" onclick="resetGame()">🔄 НОВАЯ ИГРА</button>
    </div>

    <script>
        // --------------------------------------------------------
        // ТВОИ ПРЕДМЕТЫ (9 штук) - координаты и имена файлов
        // --------------------------------------------------------
        const items = [
            { name: "СУНДУК", file: "сундук.png", x: 391, y: 736, radius: 50, found: false },
            { name: "ЗАЯЦ", file: "заяц.png", x: 183, y: 344, radius: 45, found: false },
            { name: "ЗОНТ", file: "зонт.png", x: 382, y: 229, radius: 45, found: false },
            { name: "ЗЕРКАЛО2", file: "зеркало2.png", x: 228, y: 565, radius: 50, found: false },
            { name: "ЯЩИК", file: "ящик.png", x: 530, y: 549, radius: 50, found: false },
            { name: "КОРЗИНА", file: "корзина.png", x: 398, y: 451, radius: 45, found: false },
            { name: "ЗЕРКАЛО", file: "зеркало.png", x: 288, y: 396, radius: 45, found: false },
            { name: "ВАЗА", file: "ваза.png", x: 321, y: 416, radius: 45, found: false },
            { name: "РАМКА", file: "рамка.png", x: 442, y: 335, radius: 45, found: false }
        ];

        // DOM элементы
        const imageZone = document.getElementById('imageZone');
        const image = document.getElementById('gameImage');
        const itemsContainer = document.getElementById('itemsContainer');
        const messageDiv = document.getElementById('message');

        // ОТОБРАЖЕНИЕ СПИСКА ПРЕДМЕТОВ
        function updateItemsList() {
            let html = '';
            items.forEach(item => {
                const foundClass = item.found ? 'found' : '';
                html += `
                    <div class="item-wrapper">
                        <img src="${item.file}" class="item-image ${foundClass}" alt="${item.name}">
                        <span class="item-label">${item.name}</span>
                    </div>
                `;
            });
            itemsContainer.innerHTML = html;

            // Проверка победы
            if (items.every(item => item.found)) {
                messageDiv.innerHTML = '🎉 ТЫ НАШЁЛ ВСЕ ПРЕДМЕТЫ! ПОЗДРАВЛЯЕМ! 🎉';
            } else {
                messageDiv.innerHTML = '';
            }
        }

        // СОХРАНЕНИЕ ИНФОРМАЦИИ ОБ ИГРОКЕ
        function savePlayerInfo() {
            const name = document.getElementById('firstName').value.trim();
            const institute = document.getElementById('institute').value.trim();
            
            if (name && institute) {
                alert(`✅ Спасибо, ${name} из ${institute}!`);
                // Здесь потом будет отправка в базу данных
            } else {
                alert('❌ Введите имя и институт!');
            }
        }

        // ОБРАБОТКА КЛИКА ПО КАРТИНКЕ
        imageZone.addEventListener('click', (e) => {
            const rect = imageZone.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // Масштабируем координаты
            const scaleX = image.naturalWidth / rect.width;
            const scaleY = image.naturalHeight / rect.height;
            const imgX = clickX * scaleX;
            const imgY = clickY * scaleY;

            // Проверяем каждый предмет
            items.forEach(item => {
                if (!item.found) {
                    const dx = imgX - item.x;
                    const dy = imgY - item.y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    
                    if (distance < item.radius) {
                        item.found = true;
                    }
                }
            });

            updateItemsList();
        });

        // СБРОС ИГРЫ
        function resetGame() {
            items.forEach(item => item.found = false);
            updateItemsList();
            document.getElementById('firstName').value = '';
            document.getElementById('institute').value = '';
        }

        // ЗАГРУЗКА
        image.onload = () => {
            console.log('Картинка загружена');
            updateItemsList();
        };

        if (image.complete) {
            updateItemsList();
        }

        updateItemsList();
    </script>
</body>
</html>
